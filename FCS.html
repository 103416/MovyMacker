<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./script/script.js" defer></script>
    <script src="./script/script_scripts/FCS.js" defer></script>

    <link rel="stylesheet" href="./style/screen1.css">
</head>
<body>
    <div id="bullets"></div>
    <main id="main">
        <div id="ship">
            <div id="turret">
                <div id="barrel-small"></div>
            </div>
            <div id="big-turret">
                <div id="barrel-big"></div>
            </div>
            <div id="laser">
                <div id="barrel-laser"></div>
            </div>
        </div>
        <div id="space">
        </div>
    </main>
    <sidebar id="sidebar">
        <button id="Main-cannon" onclick="shoot()">Fire Main Cannons</button><br>
        <button id="Secundaire-cannon" onclick="Sec()">Fire Secundaire Cannons</button><br>
        <button id="Laser-cannon" onclick="Laser()">Fire Laser Cannons</button><br>

        <br><br>
        <label for="turretSlider">Turret Rotation:</label>
        <input type="range" max="360" min="0" step="10" id="turretSlider" onchange="turretSlider()" oninput="turretSlider()">
        <input type="range" max="360" min="0" step="10" id="turretSlider1" onchange="turretSlider1()" oninput="turretSlider1()">
        <input type="range" max="360" min="0" step="10" id="turretSlider2" onchange="turretSlider2()" oninput="turretSlider2()">
        <span id="turretAngle">0°</span>
        <span id="turretAngle1">0°</span>
        <span id="turretAngle2">0°</span>
    </sidebar>
</body>
</html>
